services:
  - type: cron
    name: urbancool-daily-data
    runtime: python
    schedule: "30 2 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python automation/daily_update.py --retrain-model --push
    envVars:
      # Leave DAILY_CITIES unset to process every city in data/city_registry.json.
      - key: PUSH_CHANGES
        value: "true"
      - key: RETRAIN_MODEL
        value: "true"
      - key: SKIP_SEED
        value: "true"
      - key: INCLUDE_RASTERS
        value: "false"
      - key: GIT_BRANCH
        value: main
      - key: GITHUB_REPOSITORY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
