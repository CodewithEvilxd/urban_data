services:
  - type: web
    name: urbancool-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: urbancool-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-vercel-app.vercel.app

databases:
  - name: urbancool-db
    plan: free
